<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
body{
    font-family: Arial, sans-serif;
    background:skyblue;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:650px;
    background:white;
    border-radius:15px;
    padding:30px;
    position:relative;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card::before{
    content:"";
    position:absolute;
    top:-60px;
    right:-60px;
    width:180px;
    height:180px;
    background:#7d9cff;
    border-radius:50%;
}



.profile{
    display:flex;
    align-items:center;
    position:relative;
    z-index:1;
}

.profile img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:5px solid white;
    margin-right:20px;
}

.info h2{
    margin:0;
}

.info p{
    margin:5px 0;
    color:#555;
}

.stats{
    display:flex;
    gap:50px;
    margin:20px 0;
    position:relative;
    z-index:1;
}

.stats div{
    text-align:center;
}

.stats h3{
    margin:0;
}

.buttons{
    position:relative;
    z-index:1;
}

.follow{
    background:black;
    color:white;
    border:none;
    padding:12px 35px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.profile-btn{
    background:transparent;
    border:2px solid gray;
    padding:10px 25px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    margin-right:10px;
}
</style>
</head>
<body>

<div class="card">

    <div class="profile">
        <img src="img1.png" alt="Profile">
        
        <div class="info">
            <h2>Kranti Ghute</h2>
            <b>@krantighute</b>
            <p>I'm a Front End Developer, follow me to be the<br> first who see my new work.</p>
        </div>
    </div>

    <div class="stats">
        <div>
            <h3>15K</h3>
            <b>Views</b>
        </div>

        <div>
            <h3>82</h3>
            <b>Projects</b>
        </div>

        <div>
            <h3>1.3M</h3>
            <b>Followers</b>
        </div>
    </div>

    <div class="buttons">
        <button class="follow">Follow</button>
        <button class="profile-btn">View Profile</button>
    </div>

</div> 
</body>
</html>
