<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:#1e1e1e;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2d2d2d;
    color:white;
    font-size:16px;
    outline:none;
}

input::placeholder{
    color:#aaa;
}

.add-btn{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.add-btn:hover{
    background:#00a844;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    background:#2d2d2d;
    color:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.buttons{
    display:flex;
    gap:8px;
}

.update-btn{
    background:#2196f3;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.delete-btn{
    background:#f44336;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.update-btn:hover{
    background:#1976d2;
}

.delete-btn:hover{
    background:#d32f2f;
}
</style>

</head>
<body>
 <div class="container">

    <h1>📝 To Do App</h1>

    <div class="input-box">
        <input type="text" id="todo" placeholder="Enter your task">
        <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <ul id="todolist"></ul>

</div>

<script>

let arr = [];

function addTodo()
{
    let task = document.getElementById("todo").value;

    if(task=="")
    {
        alert("Enter a task");
        return;
    }

    arr.push(task);
    document.getElementById("todo").value = "";

    renderTodo();
}

function renderTodo()
{
    let list = document.getElementById("todolist");
    list.innerHTML = "";

    for(let i=0; i<arr.length; i++)
    {
        list.innerHTML += `
        <li>
            <span>${arr[i]}</span>

            <div class="buttons">
                <button class="update-btn" onclick="updateTodo(${i})">
                    Update
                </button>

                <button class="delete-btn" onclick="deleteTodo(${i})">
                    Delete
                </button>
            </div>
        </li>`;
    }
}

function updateTodo(i)
{
    let newTask = prompt("Enter new task:", arr[i]);

    if(newTask != null && newTask.trim()!="")
    {
        arr[i] = newTask;
        renderTodo();
    }
}

function deleteTodo(i)
{
    arr.splice(i,1);
    renderTodo();
}

</script>
   
</body>
</html>
