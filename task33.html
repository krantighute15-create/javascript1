<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
body{
    background:#eee;
    font-family:Arial;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    padding:20px;
}

/* Twist */
.twist{
    width:120px;
    height:250px;
    background:green;
    border-radius:100% 0 100% 0;
    color:white;
    text-align:center;
    line-height:250px;
}

/* Oval */
.oval{
    width:180px;
    height:280px;
    background:orange;
    border-radius:50%;
    color:white;
    text-align:center;
    line-height:280px;
}

/* Three Sided */
.three{
    width:150px;
    height:150px;
    background:blue;
    border-radius:0 50% 50% 0;
    color:white;
    text-align:center;
    line-height:150px;
}

/* Tab */
.tab{
    width:150px;
    height:150px;
    background:#19b5e8;
    border-radius:0 50% 50% 0;
    color:white;
    text-align:center;
    line-height:150px;
}

/* Half Oval */
.half{
    width:200px;
    height:100px;
    background:blue;
    border-radius: 0 0 100px  100px  ;
    color:white;
    text-align:center;
    line-height:150px;
}

/* Circle */
.circle{
    width:150px;
    height:150px;
    background:magenta;
    border-radius:50%;
    color:white;
    text-align:center;
    line-height:150px;
}

/* Leaf */
.leaf{
    width:180px;
    height:120px;
    background:#19b5e8;
    border-radius:0 50% 0 50%;
    color:white;
    text-align:center;
    line-height:120px;
}

/* Twist Two */
.twist2{
    width:180px;
    height:180px;
    background:purple;
    border-radius:50% 0 50% 0;
    color:white;
    text-align:center;
    line-height:180px;
}
</style>
</head>
<body>

<div class="container">

<div class="twist">Twist</div>

<div class="oval">Oval</div>

<div class="three">Three Sided</div>

<div class="tab">Tab</div>

<div class="half">Half Oval</div>

<div class="circle">Circle</div>

<div class="leaf">Leaf</div>

<div class="twist2">Twist Two</div>

</div> 
</body>
</html>
