<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

.container{
    position:relative;
    width:300px;
    height:300px;
}

.box{
    position:absolute;
    top:50%;
    left:50%;
    width:150px;
    height:150px;
    border:3px solid #008080;
    transform-origin:center;
    animation:flower 5s linear infinite;
}

.box:nth-child(1){animation-delay:0s;}
.box:nth-child(2){animation-delay:-0.15s;}
.box:nth-child(3){animation-delay:-0.30s;}
.box:nth-child(4){animation-delay:-0.45s;}
.box:nth-child(5){animation-delay:-0.60s;}
.box:nth-child(6){animation-delay:-0.75s;}
.box:nth-child(7){animation-delay:-0.90s;}
.box:nth-child(8){animation-delay:-1.05s;}
.box:nth-child(9){animation-delay:-1.20s;}
.box:nth-child(10){animation-delay:-1.35s;}
.box:nth-child(11){animation-delay:-1.50s;}
.box:nth-child(12){animation-delay:-1.65s;}
.box:nth-child(13){animation-delay:-1.80s;}
.box:nth-child(14){animation-delay:-1.95s;}
.box:nth-child(15){animation-delay:-2.10s;}
.box:nth-child(16){animation-delay:-2.25s;}

@keyframes flower{
    0%{
        transform:translate(-50%,-50%) rotate(0deg) scale(1);
    }
    100%{
        transform:translate(-50%,-50%) rotate(180deg) scale(0.2);
    }
}
</style>
</head>
<body>
    <div class="container">
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
</div>
</body>
</html>
