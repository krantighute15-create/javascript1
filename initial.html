<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="output"></div>

<script>
var pattern = "";

for (var i = 1; i <= 7; i++) {
    for (var j = 1; j <= 5; j++) {
        if (j == 1 || j == 6 - i || j == i - 2) {
            pattern += "*";
        } else {
            pattern += "&nbsp;&nbsp;&nbsp;";
        }
    }
    pattern += "<br>";
}

document.getElementById("output").innerHTML = pattern;
</script>
</body>
</html>
