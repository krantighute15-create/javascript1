<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
body{
    background:#f0f0f0;
    font-family:Arial, sans-serif;
}

.container{
    width:1000px;
    height:600px;
    margin:50px auto;
    background:white;
    display:flex;
    box-shadow:0 0 5px gray;
}

.left{
    width:35%;
    background:#2874f0;
    color:white;
    padding:30px;
}

.left h1{
    margin-top:0;
}

.left p{
    font-size:20px;
    line-height:35px;
}

.left img{
    width:250px;
    margin-top:120px;
}

.right{
    width:65%;
    padding:40px;
}

input{
    width:100%;
    border:none;
    border-bottom:2px solid #2874f0;
    padding:10px;
    font-size:16px;
    outline:none;
}

.text{
    margin-top:50px;
    color:gray;
}

button{
    width:100%;
    padding:15px;
    background:#fb641b;
    color:white;
    border:none;
    margin-top:30px;
    font-size:18px;
    cursor:pointer;
}

.create{
    text-align:center;
    margin-top:250px;
}

.create a{
    text-decoration:none;
    color:#2874f0;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Login</h1>

        <p>
            Get access to your Orders,<br>
            Wishlist and Recommendations
        </p>

        <img src="img3.png" alt="image">
    </div>

    <div class="right">

        <input type="text" placeholder="Enter Email/Mobile number">

        <p class="text">
            By continuing, you agree to Flipkart's
            Terms of Use and Privacy Policy.
        </p>

        <button>Request OTP</button>

        <div class="create">
            <a href="#">New to Flipkart? Create an account</a>
        </div>

    </div>

</div>

</body>
</html>
