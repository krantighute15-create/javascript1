<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
}

.instagram{
    width:300px;
    height:300px;
    border-radius:70px;
    background: radial-gradient(circle at 30% 107%,
        #fdf497 0%,
        #fdf497 5%,
        #fd5949 45%,
        #d6249f 60%,
        #285AEB 90%);
    position:relative;
}

.instagram::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:190px;
    height:190px;
    border:18px solid white;
    border-radius:55px;
}

.instagram::after{
    content:"";
    position:absolute;
    top:95px;
    right:75px;
    width:28px;
    height:28px;
    background:white;
    border-radius:50%;
}

.camera{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border:18px solid white;
    border-radius:50%;
}
</style>
</head>
<body>
  <div class="instagram">
    <div class="camera"></div>
</div>
  
</body>
</html>
