<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

.hero{
    height:100vh;

    /* Background Properties */
    background-image:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('net.png');

    background-repeat:no-repeat;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

.logo{
    color:red;
    font-size:40px;
    font-weight:bold;
}

.signin{
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.content{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.content h1{
    font-size:60px;
    margin-bottom:20px;
}

.content p{
    font-size:24px;
    margin-bottom:20px;
}

.email-box{
    display:flex;
}

.email-box input{
    padding:15px;
    width:350px;
    font-size:18px;
}

.email-box button{
    background:red;
    color:white;
    border:none;
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>
  <div class="hero">

    <div class="navbar">
        <div class="logo">NETFLIX</div>
        <button class="signin">Sign In</button>
    </div>

    <div class="content">
        <h1>Unlimited movies,<br>shows and more</h1>
        <p>Starts at ₹149. Cancel at any time.</p>
        <h6>Ready to watch? Enter your email to create or restart your membership</h6>
        <div class="email-box">
            <input type="email" placeholder="Email address">
            <button>Get Started </button>
        </div>
    </div>

</div>
  
</body>
</html>
