<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width:800px;
            height:500px;
            position:relative;
            background:black;
            margin:auto;
        }

        .img{
            width:100px;
            height:100px;
            position:absolute;
        }
    </style>
</head>
<body>
  <div class="container">

    <!-- Row 1 -->
    <img src="1.png" class="img" style="top:0; left:100px;">
    <img src="2.png" class="img" style="top:0; left:300px;">
    <img src="3.png" class="img" style="top:0; left:500px;">
    <img src="4.png" class="img" style="top:0; left:700px;">

    <!-- Row 2 -->
    <img src="1.png" class="img" style="top:120px; left:0;">
    <img src="2.png" class="img" style="top:120px; left:200px;">
    <img src="3.png" class="img" style="top:120px; left:400px;">
    <img src="4.png" class="img" style="top:120px; left:600px;">

    <!-- Row 3 -->
    <img src="1.png" class="img" style="top:240px; left:100px;">
    <img src="2.png" class="img" style="top:240px; left:300px;">
    <img src="3.png" class="img" style="top:240px; left:500px;">
    <img src="4.png" class="img" style="top:240px; left:700px;">

    <!-- Row 4 -->
    <img src="1.png" class="img" style="top:360px; left:0;">
    <img src="2.png" class="img" style="top:360px; left:200px;">
    <img src="3.png" class="img" style="top:360px; left:400px;">
    <img src="4.png" class="img" style="top:360px; left:600px;">

</div>  
</body>
</html>
