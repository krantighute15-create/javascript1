<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>

<body>
    <h1>Text Converter</h1>
    <textarea name="" id="content" rows="15" cols="60"></textarea>
    <br><br>
    <button onclick="convertUpperCase()">UpperCase</button>
    <button onclick="convertLowerCase()">LowerCase</button>
    <button onclick="countWord()">CountWord</button>
    <script>
        let text = document.getElementById("content")
        function convertUpperCase() {
            text.value = text.value.toUpperCase();

        }
        function convertLowerCase() {
            text.value = text.value.toLowerCase();
        }
        function countWord() {
            let a = text.value.split(" ");
            text.value = "total words :" + a.length
        }

    </script>

</body>

</html>
