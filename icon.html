<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
     <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:black;
            color:white;
            padding:30px;
            width:300px;
            border-radius:15px;
            text-align:center;
        }

        .input-box{
            margin:20px 0; 
            border-bottom:1px solid white;
        }

        .input-box i{
            color:blue;
            margin-right:10px;
        }

        .input-box input{
            border:none;
            outline:none;
            background:transparent;
            color:white;
            width:80%;
            padding:8px;
        }

        button{
            padding:10px 25px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            font-weight:bold;
        }
    </style>
</head>
<body>
 <div class="login-box">
    <h2>SIGN IN</h2>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" placeholder="Phone Number">
    </div>

    <button>SIGN IN</button>
</div>
   
</body>
</html>
